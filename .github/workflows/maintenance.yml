name: maintenance

# External embedding refresh + ANALYZE. Postgres cannot call OpenAI from inside
# a function, so the embedding refresh runs here, outside the database.
#
# This workflow is a DEPLOYMENT TEMPLATE. It only runs when the deployment has
# configured the secrets below AND the runner can reach the factory database.
# When OMATIC_DB_URL is unset it SKIPS (green) instead of failing — an
# unconfigured repo (e.g. the distribution source itself) should not go red.
#
# NOTE: a GitHub-hosted runner cannot reach a tailnet-only database. For a
# factory whose DB is on a private tailnet (e.g. the live O-Matic factory),
# run the embed refresh from a host on that network, not from this Action.
#
# Required repo secrets to enable:
#   OMATIC_DB_URL    postgres DSN to the factory database
#   OPENAI_API_KEY   embedding key (env-first; never stored in the repo)

on:
  schedule:
    - cron: "0 7 * * *"   # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  embed-refresh:
    runs-on: ubuntu-latest
    env:
      OMATIC_DB_URL: ${{ secrets.OMATIC_DB_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check configuration
        id: cfg
        run: |
          if [ -z "$OMATIC_DB_URL" ]; then
            echo "::notice::maintenance: OMATIC_DB_URL secret not set — skipping embed refresh (expected for unconfigured deployments)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install postgresql-client
        if: steps.cfg.outputs.configured == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Clear stale / unembedded rows
        if: steps.cfg.outputs.configured == 'true'
        run: python3 scripts/embed_stale.py

      - name: ANALYZE (refresh planner stats after embed pass)
        if: steps.cfg.outputs.configured == 'true'
        run: psql "$OMATIC_DB_URL" -c "ANALYZE;"
