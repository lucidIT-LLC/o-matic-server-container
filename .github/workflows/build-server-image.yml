name: build-server-image

on:
  push:
    branches: [main]
    paths: ['Dockerfile', '.github/workflows/build-server-image.yml']
  schedule:
    # Weekly rebuild pulls upstream pgvector/pgvector:pg18 + Debian security
    # updates without manual intervention. Mondays 12:00 UTC.
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          # GHCR requires a lowercase repository path; github.repository_owner
          # may be mixed-case (e.g. lucidIT-LLC), so lowercase it explicitly.
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/o-matic-server-container"
          DATE="$(date -u +'%Y.%m.%d')"
          # Immutable date-stamped tag for pinning + rollback, plus floating tags.
          echo "tags=${IMAGE}:${DATE},${IMAGE}:pg18,${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "Tags: ${IMAGE}:${DATE} (immutable), ${IMAGE}:pg18, ${IMAGE}:latest"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          pull: true   # re-fetch the upstream base so scheduled rebuilds pick up pgvector + apt updates
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
